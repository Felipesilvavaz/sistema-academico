<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Acadêmico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Sistema Acadêmico — UniFil</h1>
  </header>

  <main>
    <h2>Cadastro de Aluno</h2>
    <form id="formCadastro">
      <label>Nome completo:</label>
      <input type="text" id="nome" placeholder="Digite o nome do aluno" required>

      <label>E-mail:</label>
      <input type="email" id="email" placeholder="Digite o e-mail" required>

      <label>Curso:</label>
      <input type="text" id="curso" placeholder="Digite o curso" required>

      <label>Período:</label>
      <input type="number" id="periodo" placeholder="Digite o período" required>

      <button type="submit">Cadastrar</button>
    </form>

    <div id="mensagem"></div>
  </main>

  <script src="validacao.js"></script>

</body>
</html>
