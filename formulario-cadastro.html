<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Aluno</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Sistema Acadêmico — Módulo de Cadastro</h1>
  </header>

  <main>
    <h2>Novo Cadastro de Aluno</h2>
    <form id="formCadastro">

      <label>Nome completo:</label>
      <input type="text" id="nome" placeholder="Nome do aluno" required>

      <label>CPF:</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" required>

      <label>Data de Nascimento:</label>
      <input type="date" id="nascimento" required>

      <label>E-mail:</label>
      <input type="email" id="email" placeholder="email@email.com" required>

      <label>Curso:</label>
      <select id="curso" required>
        <option value="">Selecione o curso</option>
        <option value="engenharia">Engenharia de Software</option>
        <option value="sistemas">Sistemas de Informação</option>
        <option value="redes">Redes de Computadores</option>
      </select>

      <label>Período:</label>
      <input type="number" id="periodo" min="1" max="10" required>

      <button type="submit">Cadastrar Aluno</button>
    </form>

    <div id="mensagem"></div>
  </main>

  <script src="validacao.js"></script>
</body>
</html>
